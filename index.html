<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#F5F5F7" />
  <meta name="description" content="Inventário de Alimentos" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Inventário" />
  <link rel="manifest" href="manifest.json" />
  <title>Inventário</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">
    <span class="splash-icon">🛒</span>
  </div>
  <div class="splash-title">Inventário</div>
  <div class="splash-sub">Carregando produtos…</div>
  <div class="splash-track">
    <div id="splash-bar"></div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <div class="header">
    <h1>Inventário</h1>
    <p><span id="cnt">0</span> itens registrados</p>
  </div>

  <div class="controls">
    <div class="search-wrap">
      <svg class="search-ico" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search-input" type="text" placeholder="Buscar itens..." autocomplete="off" aria-label="Buscar itens" />
    </div>

    <div class="controls-right">
      <div class="seg" id="seg"></div>

      <div class="vtog">
        <button class="vbtn active" id="vt-pages" type="button" aria-label="Ver por páginas">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          Páginas
        </button>
        <button class="vbtn" id="vt-all" type="button" aria-label="Ver todos">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
          Todos
        </button>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="scroll-x">
      <table>
        <thead>
          <tr>
            <th data-k="Name_pt" class="sorted asc" scope="col" role="button" tabindex="0" aria-sort="ascending">Produto <span class="si">▾</span></th>
            <th data-k="Categoria_Alimentos" scope="col" role="button" tabindex="0" aria-sort="none">Categoria <span class="si">▾</span></th>
            <th data-k="Cod_Fresco" class="r" scope="col" role="button" tabindex="0" aria-sort="none">Cod. Fresco <span class="si">▾</span></th>
            <th data-k="Cod_Mix" class="r" scope="col" role="button" tabindex="0" aria-sort="none">Cod. Mix <span class="si">▾</span></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div class="pag" id="pag-footer"></div>
  </div>

</div>

<!-- PWA install banner -->
<div id="install-banner">
  <span>Adicionar ao início</span>
  <button id="install-btn" type="button">Instalar</button>
  <button id="install-dismiss" type="button" aria-label="Fechar">✕</button>
</div>

<script src="app.js" defer></script>
</body>
</html>
